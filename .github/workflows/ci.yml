name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    types: [ opened, synchronize, reopened ]

# Cancel in-progress runs for the same PR/branch
concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # -----------------------------------------------------------------------
  # Cross-platform build + test smoke (Windows + macOS)
  # Runs compile + unit tests only (no replay/benchmark — those are Linux-only)
  # -----------------------------------------------------------------------
  platform-smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Build artifacts
        run: ./gradlew assemble :ace-copilot-cli:distZip --no-daemon
        shell: bash

      - name: Cross-platform smoke tests
        run: >
          ./gradlew
          :ace-copilot-cli:test --tests dev.acecopilot.cli.TerminalMarkdownRendererTest
          :ace-copilot-tools:test --tests dev.acecopilot.tools.BashExecToolTest
          --no-daemon
        shell: bash

  # -----------------------------------------------------------------------
  # Cross-platform full test suite (Windows + macOS) — observational, NOT required.
  # Runs broader test coverage to surface platform-specific regressions.
  # Will be promoted to required once stable (Step 7c).
  # -----------------------------------------------------------------------
  platform-full:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            # macOS: run all modules except daemon integration tests (timing-sensitive)
            test-args: "-x generateReplayCases -x generateReplayReport -x preMergeCheck -x replayQualityGate -x benchmarkScorecard -x validateReplaySuite -x continuousLearningSmoke"
          - os: windows-latest
            # Windows: skip daemon test module (Gradle test worker JVM crashes when forking
            # tests in a module that references AF_UNIX classes, even with @DisabledOnOs).
            # All other modules run their full test suites on Windows.
            test-args: "-x :ace-copilot-daemon:test -x generateReplayCases -x generateReplayReport -x preMergeCheck -x replayQualityGate -x benchmarkScorecard -x validateReplaySuite -x continuousLearningSmoke"
    runs-on: ${{ matrix.os }}
    # Observational only — failures do not block PRs
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Full platform test suite
        run: ./gradlew build ${{ matrix.test-args }} --no-daemon
        shell: bash

  # -----------------------------------------------------------------------
  # Full pre-merge check (Linux only — includes replay, benchmark, quality gates)
  # -----------------------------------------------------------------------
  pre-merge-check:
    runs-on: ubuntu-latest
    env:
      REPLAY_FULL_MODE: ${{ vars.ACE_COPILOT_REPLAY_FULL_MODE || 'false' }}
      REPLAY_PROMPTS_PATH: ${{ vars.ACE_COPILOT_REPLAY_PROMPTS_PATH || (vars.ACE_COPILOT_REPLAY_FULL_MODE == 'true' && 'docs/reports/samples/replay-prompts-sample.json' || 'docs/reports/samples/replay-prompts-ci-short.json') }}
      # Structural minimum: 3 = can run. Statistical significance (10) is enforced by BenchmarkScorecard.
      REPLAY_SUITE_MIN_PER_CATEGORY: ${{ vars.ACE_COPILOT_REPLAY_SUITE_MIN_PER_CATEGORY || '3' }}
      REPLAY_MAX_TOKEN_ESTIMATION_ERROR_RATIO: ${{ vars.ACE_COPILOT_REPLAY_MAX_TOKEN_ESTIMATION_ERROR_RATIO || '0.65' }}
      REPLAY_FAIL_ON_LATENCY: ${{ vars.ACE_COPILOT_REPLAY_FAIL_ON_LATENCY || 'false' }}
      # Rollout default: collect metric first; enforce only when explicitly enabled.
      REPLAY_ENFORCE_ANTI_PATTERN_FP_RATE: ${{ vars.ACE_COPILOT_REPLAY_ENFORCE_ANTI_PATTERN_FP_RATE || 'false' }}
      REPLAY_MAX_ANTI_PATTERN_FP_RATE: ${{ vars.ACE_COPILOT_REPLAY_MAX_ANTI_PATTERN_FP_RATE || '0.50' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Generate replay cases (learning off/on)
        run: >
          ./gradlew generateReplayCases
          -PreplayPromptsInput=${{ env.REPLAY_PROMPTS_PATH }}
          -PreplayCasesOutput=${{ vars.ACE_COPILOT_REPLAY_INPUT_PATH || '.ace-copilot/metrics/continuous-learning/replay-cases.json' }}
          -PreplayCasesManifestOutput=${{ vars.ACE_COPILOT_REPLAY_MANIFEST_PATH || '.ace-copilot/metrics/continuous-learning/replay-cases.manifest.json' }}
          -PreplaySuiteMinPerCategory=${{ env.REPLAY_SUITE_MIN_PER_CATEGORY }}
          -PreplayTimeoutMs=${{ vars.ACE_COPILOT_REPLAY_TIMEOUT_MS || '180000' }}
          -PreplayAutoApprovePermissions=${{ vars.ACE_COPILOT_REPLAY_AUTO_APPROVE_PERMISSIONS || 'true' }}
          --no-daemon

      - name: Generate replay report
        run: >
          ./gradlew generateReplayReport
          -PreplayCasesInput=${{ vars.ACE_COPILOT_REPLAY_INPUT_PATH || '.ace-copilot/metrics/continuous-learning/replay-cases.json' }}
          -PreplayCasesManifestInput=${{ vars.ACE_COPILOT_REPLAY_MANIFEST_PATH || '.ace-copilot/metrics/continuous-learning/replay-cases.manifest.json' }}
          -PreplayAntiPatternFeedbackPath=${{ vars.ACE_COPILOT_ANTI_PATTERN_FEEDBACK_PATH || '.ace-copilot/metrics/continuous-learning/anti-pattern-gate-feedback.json' }}
          -PreplayReport=${{ vars.ACE_COPILOT_REPLAY_REPORT_PATH || '.ace-copilot/metrics/continuous-learning/replay-latest.json' }}
          --no-daemon

      - name: Pre-merge quality gate
        run: >
          ./gradlew preMergeCheck
          -PreplayGateStrict=true
          -PreplayReport=${{ vars.ACE_COPILOT_REPLAY_REPORT_PATH || '.ace-copilot/metrics/continuous-learning/replay-latest.json' }}
          -PreplayMaxTokenEstimationErrorRatio=${{ env.REPLAY_MAX_TOKEN_ESTIMATION_ERROR_RATIO }}
          -PreplayFailOnLatency=${{ env.REPLAY_FAIL_ON_LATENCY }}
          -PreplayEnforceAntiPatternFalsePositiveRate=${{ env.REPLAY_ENFORCE_ANTI_PATTERN_FP_RATE }}
          -PreplayMaxAntiPatternFalsePositiveRate=${{ env.REPLAY_MAX_ANTI_PATTERN_FP_RATE }}
          --no-daemon

  # When main gets new commits, re-test all open PRs
  retrigger-prs:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Update PR branches to re-trigger CI
        uses: actions/github-script@v7
        with:
          script: |
            const pulls = await github.paginate(github.rest.pulls.list, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
            });

            for (const pr of pulls) {
              try {
                console.log(`Updating PR #${pr.number}: ${pr.title}`);
                await github.rest.pulls.updateBranch({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                });
                console.log(`  Merged main into PR #${pr.number}, CI will re-trigger`);
              } catch (err) {
                console.log(`  PR #${pr.number}: ${err.message}, skipping`);
              }
            }
